name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build static export
        env:
          GITHUB_PAGES: "true"
        run: npm run build

      - name: Add root redirect and nojekyll
        run: |
          touch out/.nojekyll
          cat > out/index.html << 'REDIR'
          <!DOCTYPE html>
          <html>
            <head><meta http-equiv="refresh" content="0;url=./en/" /></head>
            <body><a href="./en/">Redirecting…</a></body>
          </html>
          REDIR

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
